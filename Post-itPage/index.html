<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <title>Post-it Animados</title>
</head>
<body>
  <main class="page">
    <section class="postit-area">
      <div class="postit postit-1">
        <div class="postit-corner"></div>
        <h2 class="postit-title">Note 1</h2>
        <p class="postit-text">Creare i post-it.</p>
      </div>

      <div class="postit postit-2">
        <div class="postit-corner"></div>
        <h2 class="postit-title">Note 2</h2>
        <p class="postit-text">Colorarli.</p>
      </div>

      <div class="postit postit-3">
        <div class="postit-corner"></div>
        <h2 class="postit-title">Note 3</h2>
        <p class="postit-text">Affiancarli.</p>
      </div>

      <div class="postit postit-4">
        <div class="postit-corner"></div>
        <h2 class="postit-title">Note 4</h2>
        <p class="postit-text">Al hacer click, la hoja cae.</p>
      </div>
      <div class="postit postit-1">
        <div class="postit-corner"></div>
        <h2 class="postit-title">Note 5</h2>
        <p class="postit-text">Ombreggiarli</p>
      </div>

      <div class="postit postit-2">
        <div class="postit-corner"></div>
        <h2 class="postit-title">Note 6</h2>
        <p class="postit-text">Ruotarli</p>
      </div>

      <div class="postit postit-3">
        <div class="postit-corner"></div>
        <h2 class="postit-title">Note 7</h2>
        <p class="postit-text">Animarli.</p>
      </div>

      <div class="postit postit-4">
        <div class="postit-corner"></div>
        <h2 class="postit-title">Note 8</h2>
        <p class="postit-text">Testarli.</p>
      </div>
    </section>
  </main>

  <script>
    const postits = document.querySelectorAll(".postit");

    postits.forEach((postit) => {
      postit.addEventListener("click", () => {
        postit.classList.add("is-falling");

        postit.addEventListener(
          "animationend",
          () => {
            postit.classList.remove("is-falling");
          },
          { once: true }
        );
      });
    });
  </script>
</body>
</html>
